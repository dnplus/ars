# MiniMax TTS 破音字字典
# 格式: "詞組/(pinyin1)(pinyin2)"
# 聲調: 1=一聲, 2=二聲, 3=三聲, 4=四聲, 5=輕聲
#
# ============================================
# 英文縮寫發音格式
# ============================================
# 英文縮寫可使用以下兩種格式：
# 1. 分開字母讀音：  "GB/G B" → 讀成 "G B"
# 2. 完整單字讀音：  "GB/Gigabyte" → 讀成完整英文
#
# ⚠️ 注意：
# - MiniMax 對某些常見縮寫有預設唸法（如：AI 可能會讀成"兆字節"）
# - 如發現預設唸法不正確，可用上述格式覆蓋
# - 建議優先使用「分開讀音」格式，更清晰易懂
# ============================================

