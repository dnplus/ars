<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GSS Internal - Interactive Slides" />
    <title>GSS Internal - Slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: 'Noto Sans TC';
        src: url('/shared/fonts/NotoSansTC-Regular.otf') format('opentype');
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Noto Sans TC';
        src: url('/shared/fonts/NotoSansTC-Medium.otf') format('opentype');
        font-style: normal;
        font-weight: 500;
        font-display: swap;
      }
      @font-face {
        font-family: 'Noto Sans TC';
        src: url('/shared/fonts/NotoSansTC-Bold.otf') format('opentype');
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; width: 100%; overflow: hidden;
        font-family: 'Noto Sans TC', system-ui, sans-serif;
        background: #0a1628; color: #e2e8f0;
      }
      #root { height: 100%; width: 100%; }
      .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
      .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e3a5f; border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading slides...</p>
      </div>
    </div>
    <script type="module" src="./slides-main.tsx"></script>
  </body>
</html>
