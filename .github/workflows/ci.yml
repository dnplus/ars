name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          ARS_SKIP_REMOTION_SKILL_INSTALL: "1"
          ARS_SKIP_PREFLIGHT_CHECKS: "1"

      - name: Validate template episode
        run: npx ars episode validate template/ep-demo
